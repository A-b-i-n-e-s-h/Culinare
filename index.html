                        <form id="loginForm">

                            <div class="input-group">
                                <input type="text" id="input-email" onkeyup="validateEmail()" required placeholder=" ">
                                <label for="input-email">Email Address</label>
                            </div>
                            <p id="emailError">&nbsp;</p>

                            <!-- <div class="pass-flex">
                                <span></span>
                                <p>Forgot password?</p>
                            </div> -->

                            <div class="input-group">
                                <input type="password" id="input-password" onkeyup="validatePassword()" required
                                    placeholder=" ">
                                <label for="input-password">Password</label>
                            </div>
                            <div class="pass-flex">
                                <p id="passwordError"></p>
                                <p class="forgot-text">Forgot password?</p>
                            </div>
                            <div class="checkbox-flex">
                                <input type="checkbox" id="keep-me-signed">
                                <label for="keep-me-signed" class="checkbox-content">Keep me signed in</label>
                            </div>

                            <button type="submit" class="btn-login">Sign In →</button>

                        <div class="create-account">
